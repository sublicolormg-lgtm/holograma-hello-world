<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Robótica</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:#00ffff;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* EFECTO HOLOGRÁFICO */
.holo{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

/* AVIÓN SVG */
.plane-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    animation:float 3s ease-in-out infinite;
}

svg{
    width:300px;
    filter:drop-shadow(0 0 15px #00ffff)
           drop-shadow(0 0 30px #00ffff);
}

.info{
    padding:40px;
    font-size:1.2rem;
    animation:fade 1.5s ease-in;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body onclick="nextStage()">

<div id="content"></div>

<script>
let stage = 0;
const content = document.getElementById("content");

function showTouch(){
    content.innerHTML = `<h1 class="holo">TOCA AQUÍ</h1>`;
}

function createPlane(text,size){
    content.innerHTML = `
    <div class="plane-container">
        <svg viewBox="0 0 512 512">
            <polygon fill="none" stroke="#00ffff" stroke-width="6"
            points="256,40 470,470 256,380 42,470"/>
        </svg>
        <div style="
            position:absolute;
            color:#00ffff;
            font-size:${size}px;
            text-shadow:0 0 10px #00ffff,
                        0 0 20px #00ffff,
                        0 0 40px #00ffff;">
            ${text}
        </div>
    </div>
    `;
}

function showInfo(){
    content.innerHTML = `
    <div class="info">
        <h2>¿Qué es la Robótica?</h2>
        <p>
        La robótica es una disciplina que combina programación,
        electrónica y mecánica para diseñar y construir robots.
        </p>
        <p>
        Permite desarrollar máquinas inteligentes capaces de
        ejecutar tareas automáticamente y apoyar al ser humano
        en diferentes ámbitos industriales y tecnológicos.
        </p>
    </div>
    `;
}

function nextStage(){
    stage++;

    if(stage===1){
        createPlane("HELLO WORLD",20);
    }
    else if(stage===2){
        showInfo();
    }
    else if(stage===3){
        createPlane("GRACIAS",16);
    }
    else{
        stage=0;
        showTouch();
    }
}

showTouch();
</script>

</body>
</html>
