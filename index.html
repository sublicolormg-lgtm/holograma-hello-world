<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Interactivo Robótica</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:#00ffff;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* TEXTO HOLOGRÁFICO */
.holo{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* AVIÓN */
.word{
    position:absolute;
    font-size:10px;
    color:#00ffff;
    text-shadow:0 0 8px #00ffff,
                0 0 15px #00ffff,
                0 0 25px #00ffff;
}

.plane{
    position:absolute;
    width:100%;
    height:100%;
}

.info{
    padding:40px;
    font-size:1.2rem;
    animation:fade 1.5s ease-in;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body onclick="nextStage()">

<div id="content"></div>

<script>
let stage = 0;
const content = document.getElementById("content");

function showTouch(){
    content.innerHTML = `
        <h1 class="holo">TOCA AQUÍ</h1>
    `;
}

function createPlane(sizeFactor, textLabel="HELLO WORLD"){
    content.innerHTML = '<div class="plane" id="plane"></div>';
    const container = document.getElementById("plane");

    const width = window.innerWidth;
    const height = window.innerHeight;
    const scale = (Math.min(width,height)/30)*sizeFactor;

    const points = [
        [0,-8],[-6,0],[-2,-2],[0,3],[2,-2],[6,0],[0,-8]
    ];

    points.forEach(p=>{
        let span=document.createElement("span");
        span.className="word";
        span.innerText=textLabel;

        span.style.left=(width/2+p[0]*scale)+"px";
        span.style.top=(height/2+p[1]*scale)+"px";

        container.appendChild(span);
    });

    for(let i=-5;i<=5;i++){
        for(let j=-2;j<=2;j++){
            if(Math.abs(i)+Math.abs(j)<6){
                let span=document.createElement("span");
                span.className="word";
                span.innerText=textLabel;

                span.style.left=(width/2+i*scale)+"px";
                span.style.top=(height/2+j*scale)+"px";

                container.appendChild(span);
            }
        }
    }
}

function showInfo(){
    content.innerHTML = `
    <div class="info">
        <h2>¿Qué es la Robótica?</h2>
        <p>
        La robótica es la rama de la ingeniería y la tecnología que se encarga
        del diseño, construcción y programación de robots capaces de realizar
        tareas de forma automática.
        </p>
        <p>
        Integra áreas como programación, electrónica y mecánica para crear
        sistemas inteligentes que apoyan al ser humano en distintos ámbitos.
        </p>
    </div>
    `;
}

function nextStage(){
    stage++;

    if(stage===1){
        createPlane(1.2,"HELLO WORLD"); // avión grande
    }
    else if(stage===2){
        showInfo(); // información robótica
    }
    else if(stage===3){
        createPlane(0.6,"GRACIAS"); // avión pequeño + gracias
    }
    else{
        stage=0;
        showTouch();
    }
}

showTouch();
</script>

</body>
</html>
