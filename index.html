<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holograma Hello World</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    text-align: center;
}

/* EFECTO HOLOGRAMA */
.hologram-text {
    font-size: 3rem;
    color: #00ffff;
    position: relative;
    animation: float 3s ease-in-out infinite;
    text-transform: uppercase;
    letter-spacing: 3px;
}

.hologram-text::before,
.hologram-text::after {
    content: "HELLO WORLD";
    position: absolute;
    left: 0;
    width: 100%;
    opacity: 0.7;
}

.hologram-text::before {
    color: #00f7ff;
    transform: translateX(-3px);
}

.hologram-text::after {
    color: #0088ff;
    transform: translateX(3px);
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* DEFINICION */
.definition {
    color: #00ffff;
    font-size: 1.2rem;
    padding: 20px;
    animation: fadeIn 1.5s ease-in;
}

/* MUNDO */
.globe {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 3px solid #00ffff;
    box-shadow: 0 0 30px #00ffff;
    margin: auto;
    animation: rotate 6s linear infinite;
}

@keyframes rotate {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

.features {
    color: #00ffff;
    margin-top: 20px;
    font-size: 1rem;
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body onclick="nextStage()">

<div id="content">
    <div class="hologram-text">HELLO WORLD</div>
</div>

<script>
let stage = 0;

function nextStage() {
    const content = document.getElementById("content");
    stage++;

    if (stage === 1) {
        content.innerHTML = `
        <div class="definition">
        <h2>¿Qué es la Programación?</h2>
        <p>La programación es el proceso de crear instrucciones que una computadora puede ejecutar para resolver problemas y desarrollar soluciones tecnológicas.</p>
        </div>`;
    }

    else if (stage === 2) {
        content.innerHTML = `
        <div class="globe"></div>
        <div class="features">
            <p><strong>Lógica:</strong> Secuencia ordenada de instrucciones.</p>
            <p><strong>Precisión:</strong> Instrucciones claras y exactas.</p>
            <p><strong>Automatización:</strong> Permite ejecutar tareas automáticamente.</p>
        </div>`;
    }

    else {
        stage = 0;
        content.innerHTML = `<div class="hologram-text">HELLO WORLD</div>`;
    }
}
</script>

</body>
</html>
