<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holograma Corazón</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Texto holográfico */
.word {
    position: absolute;
    color: #00ffff;
    font-size: 12px;
    text-shadow: 0 0 8px #00ffff,
                 0 0 15px #00ffff,
                 0 0 25px #00ffff;
}

/* Animación latido */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.heart {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: pulse 1.5s infinite;
}
</style>
</head>

<body>

<div class="container">
    <div class="heart" id="heart"></div>
</div>

<script>
const container = document.getElementById("heart");

const width = window.innerWidth;
const height = window.innerHeight;

const scale = Math.min(width, height) / 40;

for (let i = 0; i < 200; i++) {
    let t = Math.PI * 2 * i / 200;

    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t);

    let span = document.createElement("span");
    span.className = "word";
    span.innerText = "HELLO WORLD";

    span.style.left = (width / 2 + x * scale) + "px";
    span.style.top = (height / 2 - y * scale) + "px";

    container.appendChild(span);
}
</script>

</body>
</html>
