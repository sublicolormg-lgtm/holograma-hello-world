<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holograma Corazón</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Contenedor central */
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Texto holográfico */
.word {
    position: absolute;
    color: #00ffff;
    font-size: 14px;
    text-shadow: 0 0 10px #00ffff,
                 0 0 20px #00ffff,
                 0 0 30px #00ffff;
    animation: float 2s ease-in-out infinite alternate;
}

/* Movimiento flotante */
@keyframes float {
    from { transform: translateY(-3px); }
    to { transform: translateY(3px); }
}

/* Latido del corazón */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.heart {
    animation: pulse 1.5s infinite;
}
</style>
</head>

<body>

<div class="container heart" id="heart"></div>

<script>
const container = document.getElementById("heart");

// Fórmula matemática para corazón
for (let i = 0; i < 100; i++) {
    let t = Math.PI * 2 * i / 100;

    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) 
            - 5 * Math.cos(2*t) 
            - 2 * Math.cos(3*t) 
            - Math.cos(4*t);

    let span = document.createElement("span");
    span.className = "word";
    span.innerText = "HELLO WORLD";

    // Ajuste de posición en pantalla
    span.style.left = (window.innerWidth / 2 + x * 15) + "px";
    span.style.top = (window.innerHeight / 2 - y * 15) + "px";

    container.appendChild(span);
}
</script>

</body>
</html>
