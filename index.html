<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Robótica</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:#00ffff;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* EFECTO HOLOGRÁFICO */
.holo{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* CONTENEDOR AVIÓN */
.plane-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
    animation:float 3s ease-in-out infinite;
}

/* AVIÓN LATERAL */
svg{
    width:400px;
    filter:drop-shadow(0 0 15px #00ffff)
           drop-shadow(0 0 30px #00ffff);
}

/* TEXTO SOBRE AVIÓN */
.plane-text{
    position:absolute;
    font-size:22px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
}

.info{
    padding:40px;
    font-size:1.2rem;
    animation:fade 1.5s ease-in;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body onclick="nextStage()">

<div id="content"></div>

<script>
let stage = 0;
const content = document.getElementById("content");

function showTouch(){
    content.innerHTML = `<h1 class="holo">TOCA AQUÍ</h1>`;
}

function createPlane(text){
    content.innerHTML = `
    <div class="plane-container">
        <svg viewBox="0 0 600 300">
            <!-- Cuerpo principal -->
            <polygon fill="none" stroke="#00ffff" stroke-width="4"
            points="50,150 500,120 420,150 500,180"/>

            <!-- Ala inferior -->
            <polygon fill="none" stroke="#00ffff" stroke-width="4"
            points="250,150 380,230 300,150"/>

            <!-- Línea interna -->
            <line x1="50" y1="150" x2="420" y2="150"
            stroke="#00ffff" stroke-width="3"/>
        </svg>

        <div class="plane-text">${text}</div>
    </div>
    `;
}

function showInfo(){
    content.innerHTML = `
    <div class="info">
        <h2>¿Qué es la Robótica?</h2>
        <p>
        La robótica es una disciplina que combina programación,
        electrónica y mecánica para diseñar robots capaces de
        ejecutar tareas automáticamente.
        </p>
        <p>
        Su aplicación abarca industrias, medicina, tecnología
        y automatización de procesos.
        </p>
    </div>
    `;
}

function nextStage(){
    stage++;

    if(stage===1){
        createPlane("HELLO WORLD");
    }
    else if(stage===2){
        showInfo();
    }
    else if(stage===3){
        createPlane("GRACIAS");
    }
    else{
        stage=0;
        showTouch();
    }
}

showTouch();
</script>

</body>
</html>
