<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Robótica</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:#00ffff;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* Holograma */
.holo{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* Contenedor avión */
.plane-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    animation:float 3s ease-in-out infinite;
}

/* Avión SVG */
svg{
    width:350px;
    filter:drop-shadow(0 0 15px #00ffff)
           drop-shadow(0 0 30px #00ffff);
}

/* Texto dentro del avión */
.plane-text{
    position:absolute;
    font-size:20px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
}

.info{
    padding:40px;
    font-size:1.2rem;
    animation:fade 1.5s ease-in;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body onclick="nextStage()">

<div id="content"></div>

<script>
let stage = 0;
const content = document.getElementById("content");

function showTouch(){
    content.innerHTML = `<h1 class="holo">TOCA AQUÍ</h1>`;
}

function createPlane(text){
    content.innerHTML = `
    <div class="plane-container">
        <svg viewBox="0 0 512 512">
            <!-- Ala izquierda -->
            <polygon fill="none" stroke="#00ffff" stroke-width="5"
            points="256,60 60,450 230,360"/>
            
            <!-- Ala derecha -->
            <polygon fill="none" stroke="#00ffff" stroke-width="5"
            points="256,60 452,450 282,360"/>

            <!-- Línea central -->
            <line x1="256" y1="60" x2="256" y2="450"
            stroke="#00ffff" stroke-width="4"/>
        </svg>

        <div class="plane-text">${text}</div>
    </div>
    `;
}

function showInfo(){
    content.innerHTML = `
    <div class="info">
        <h2>¿Qué es la Robótica?</h2>
        <p>
        La robótica es una disciplina que integra programación,
        electrónica y mecánica para diseñar y construir robots.
        </p>
        <p>
        Su finalidad es desarrollar sistemas automáticos capaces
        de ejecutar tareas y asistir al ser humano en distintos campos.
        </p>
    </div>
    `;
}

function nextStage(){
    stage++;

    if(stage===1){
        createPlane("HELLO WORLD");
    }
    else if(stage===2){
        showInfo();
    }
    else if(stage===3){
        createPlane("GRACIAS");
    }
    else{
        stage=0;
        showTouch();
    }
}

showTouch();
</script>

</body>
</html>
