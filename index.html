<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Robótica</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:#00ffff;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* HOLOGRAMA */
.holo{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

/* TEXTO AVION */
.word{
    position:absolute;
    font-size:9px;
    color:#00ffff;
    text-shadow:0 0 8px #00ffff,
                0 0 15px #00ffff,
                0 0 25px #00ffff;
}

.info{
    padding:40px;
    font-size:1.2rem;
    animation:fade 1.5s ease-in;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body onclick="nextStage()">

<div id="content"></div>

<script>
let stage = 0;
const content = document.getElementById("content");

function showTouch(){
    content.innerHTML = `<h1 class="holo">TOCA AQUÍ</h1>`;
}

function createPlane(size, text){
    content.innerHTML="";
    const w = window.innerWidth;
    const h = window.innerHeight;
    const scale = (Math.min(w,h)/25)*size;

    const planePoints = [
        [0,-10],      // punta
        [-8,2],       // ala izquierda
        [-3,0],
        [0,6],        // centro abajo
        [3,0],
        [8,2],        // ala derecha
        [0,-10]       // regreso punta
    ];

    planePoints.forEach(p=>{
        let span=document.createElement("span");
        span.className="word";
        span.innerText=text;
        span.style.left=(w/2+p[0]*scale)+"px";
        span.style.top=(h/2+p[1]*scale)+"px";
        content.appendChild(span);
    });

    // Relleno interior del avión
    for(let x=-6;x<=6;x++){
        for(let y=-2;y<=4;y++){
            if(Math.abs(x) + y < 7 && y>=-1){
                let span=document.createElement("span");
                span.className="word";
                span.innerText=text;
                span.style.left=(w/2+x*scale)+"px";
                span.style.top=(h/2+y*scale)+"px";
                content.appendChild(span);
            }
        }
    }
}

function showInfo(){
    content.innerHTML = `
    <div class="info">
        <h2>¿Qué es la Robótica?</h2>
        <p>
        La robótica es una disciplina que combina programación,
        electrónica y mecánica para diseñar y construir robots.
        </p>
        <p>
        Su objetivo es crear máquinas capaces de realizar tareas
        automáticamente y apoyar al ser humano en distintas áreas.
        </p>
    </div>
    `;
}

function nextStage(){
    stage++;

    if(stage===1){
        createPlane(1.2,"HELLO WORLD");
    }
    else if(stage===2){
        showInfo();
    }
    else if(stage===3){
        createPlane(0.6,"GRACIAS");
    }
    else{
        stage=0;
        showTouch();
    }
}

showTouch();
</script>

</body>
</html>
